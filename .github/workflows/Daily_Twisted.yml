name: Daily Twisted

on:
  schedule:
    - cron: "10 19 * * *"   # 7:10 PM CST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Luvit (prebuilt binaries)
        run: |
          curl -L https://github.com/luvit/luvit/releases/download/2.18.1/luvit-2.18.1-linux64 -o luvit
          chmod +x luvit

      - name: Run Daily Twisted bot
        run: |
          ./luvit DailyTwistedBot.lua send
