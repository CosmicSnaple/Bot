name: Daily_Twisted

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Luvit (CI-safe)
        run: |
          git clone https://github.com/luvit/luvi.git

          cd luvi
          make regular
          make
          cd ..

      - name: Download lit (official)
        run: |
          curl -L https://github.com/luvit/lit/raw/master/lit.lua -o lit.lua

      - name: Debug luvi build output
        run: |
          echo "=== TOP LEVEL ==="
          ls -l luvi/build

      - name: Build Luvit
        run: |
          LUVI_PATH=$(find luvi/build -maxdepth 2 -type f -perm -111 | head -n 1)
          echo "Using luvi executable: $LUVI_PATH"

          $LUVI_PATH lit.lua make luvit
          chmod +x luvit

      - name: Decrypt bot code
        run: |
          openssl aes-256-cbc -d -pbkdf2 \
            -in TwistedBot.lua.enc \
            -out TwistedBot.lua \
            -pass pass:"${{ secrets.BOT_KEY }}"

      - name: Run Daily Twisted bot
        timeout-minutes: 10
        run: |
          ./luvit TwistedBot.lua send
