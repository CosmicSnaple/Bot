name: Daily_Twisted

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Luvit (CI-safe)
        run: |
          git clone https://github.com/luvit/luvi.git
          git clone https://github.com/luvit/lit.git

          cd luvi
          make regular
          cd ..

          ./luvi/build/luvi-regular lit/make.lua make luvit
          chmod +x luvit

      - name: Decrypt bot code
        run: |
          openssl aes-256-cbc -d -pbkdf2 -in TwistedBot.lua.enc -out TwistedBot.lua -pass pass:"${{ secrets.BOT_KEY }}"

      - name: Run Daily Twisted bot
        run: |
          ./luvit TwistedBot.lua send
