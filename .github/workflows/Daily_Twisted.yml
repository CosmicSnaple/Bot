name: Daily_Twisted

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Luvit (CI-safe)
        run: |
          git clone https://github.com/luvit/luvi.git
          git clone https://github.com/luvit/lit.git

          cd luvi
          make regular      # <-- REQUIRED for your version
          make              # <-- builds the actual luvi binary
          cd ..

      - name: Debug luvi build output
        run: |
          echo "=== TOP LEVEL ==="
          ls -l luvi/build
          echo "=== RECURSIVE ==="
          ls -R luvi/build

      - name: Build Luvit
        run: |
          # Automatically detect the luvi executable
          LUVI_PATH=$(find luvi/build -maxdepth 2 -type f -perm -111 | head -n 1)
          echo "Using luvi executable: $LUVI_PATH"

          $LUVI_PATH lit/make.lua make luvit
          chmod +x luvit

      - name: Decrypt bot code
        run: |
          openssl aes-256-cbc -d -pbkdf2 \
            -in TwistedBot.lua.enc \
            -out TwistedBot.lua \
            -pass pass:"${{ secrets.BOT_KEY }}"

      - name: Run Daily Twisted bot
        run: |
          ./luvit TwistedBot.lua send
