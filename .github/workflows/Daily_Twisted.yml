name: Daily Twisted

on:
  schedule:
    - cron: "10 19 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest Luvit release (auto-detect)
        run: |
          ASSET_URL=$(curl -s https://api.github.com/repos/luvit/luvit/releases/latest \
            | grep browser_download_url \
            | grep linux \
            | cut -d '"' -f 4)

          echo "Downloading: $ASSET_URL"
          curl -L "$ASSET_URL" -o luvit.tar.gz

          tar -xzf luvit.tar.gz
          mv luvit*/luvit ./luvit
          chmod +x luvit

      - name: Run Daily Twisted bot
        run: |
          ./luvit DailyTwistedBot.lua send
