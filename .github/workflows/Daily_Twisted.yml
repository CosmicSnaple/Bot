name: Daily_Twisted

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Luvit (stable GitHub mirror)
        run: |
          curl -L https://github.com/luvit/luvi/releases/download/v2.21.0/luvi-regular-Linux_x86_64.zip -o luvi.zip
          unzip luvi.zip
          chmod +x luvi

          curl -L https://github.com/luvit/lit/archive/refs/tags/3.8.5.zip -o lit.zip
          unzip lit.zip
          mv lit-3.8.5 lit

          ./luvi lit/make.lua make luvit
          chmod +x luvit

      - name: Decrypt bot code
        run: |
          openssl aes-256-cbc -d -pbkdf2 -in TwistedBot.lua.enc -out TwistedBot.lua -pass pass:"${{ secrets.BOT_KEY }}"

      - name: Run Daily Twisted bot
        run: |
          ./luvit TwistedBot.lua send
