name: Daily_Twisted

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Luvit + Luvi + Lit (prebuilt)
        run: |
          curl -L https://github.com/luvit/luvit/releases/latest/download/luvit-linux64 -o luvit
          curl -L https://github.com/luvit/luvi/releases/latest/download/luvi-linux64 -o luvi
          curl -L https://github.com/luvit/lit/releases/latest/download/lit-linux64 -o lit

          chmod +x luvit
          chmod +x luvi
          chmod +x lit

      - name: Decrypt bot code
        run: |
          openssl aes-256-cbc -d -pbkdf2 \
            -in TwistedBot.lua.enc \
            -out TwistedBot.lua \
            -pass pass:"${{ secrets.BOT_KEY }}"

      - name: Run Daily Twisted bot
        timeout-minutes: 10
        run: |
          ./luvit TwistedBot.lua send
