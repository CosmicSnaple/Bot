name: Daily Twisted

on:
  schedule:
    - cron: "10 19 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Luvit (official installer)
        run: |
          curl -L https://github.com/luvit/lit/raw/master/get-lit.sh | sh
          ./lit make luvit

      - name: Run Daily Twisted bot
        run: |
          ./luvit DailyTwistedBot.lua send
